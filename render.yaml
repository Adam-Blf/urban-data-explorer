services:
  - type: web
    plan: free
    name: urban-data-explorer-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: RENDER_EXTERNAL_URL
        value: https://urban-data-explorer-api.onrender.com

