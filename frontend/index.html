<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Urban Data Explorer · Paris</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<meta name="theme-color" content="#0a0e1a" />
<meta name="description" content="Explorer les dynamiques du logement à Paris · pipeline data + carte interactive" />
<meta property="og:title" content="Urban Data Explorer · Paris" />
<meta property="og:description" content="Prix au m², logements sociaux, espaces verts, vélib, écoles · pipeline Bronze/Silver/Gold + carte MapLibre" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Urban Data Explorer <span class="badge">Paris</span></h1>
  <p>Logement · pipeline Bronze/Silver/Gold · carte interactive</p>
</header>

<main>
  <aside id="panel">
    <label for="indicator">Indicateur</label>
    <select id="indicator"></select>

    <label for="year">Année</label>
    <div class="year-row">
      <input id="year" type="range" />
      <output id="year-label">—</output>
    </div>

    <div id="legend">
      <div class="legend-title">Échelle</div>
      <div class="legend-bar"></div>
      <div class="legend-ticks"><span id="lg-min">—</span><span id="lg-med">—</span><span id="lg-max">—</span></div>
    </div>

    <section id="detail" aria-live="polite">
      <p class="hint">Cliquez un arrondissement sur la carte pour voir ses détails.</p>
    </section>

    <section id="compare">
      <h2>Comparer deux arrondissements</h2>
      <select id="cmpA"></select>
      <select id="cmpB"></select>
      <div id="cmp-result"></div>
    </section>
  </aside>

  <div id="map" role="application" aria-label="Carte choroplèthe des arrondissements de Paris"></div>
</main>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="app.js" type="module"></script>
</body>
</html>
