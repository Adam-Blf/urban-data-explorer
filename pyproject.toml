[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    "data",
    "logs",
    ".venv",
    "docs",
    ".github",
]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = [
    "E501",  # long lines tolerated for SQL/long strings
    "B008",  # FastAPI Depends() in defaults
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra"
filterwarnings = [
    "ignore::DeprecationWarning",
]
