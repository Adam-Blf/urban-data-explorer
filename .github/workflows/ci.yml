name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Lint & test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install runtime + dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # PDF/PPT generators only · scikit-learn was a leftover from an
          # earlier ML iteration removed from scope. svglib needs libcairo2-dev
          # which we don't pull in (PNG logo is committed directly).
          pip install reportlab python-pptx

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest (smoke + unit)
        env:
          JWT_SECRET: ci-secret-thirty-two-characters-long
          DEMO_USER: admin
          DEMO_PASSWORD: admin
        run: pytest -q

      - name: Verify demo DB still seeds
        run: python scripts/seed_demo_db.py

      - name: Build PDF report
        run: python scripts/build_report.py

      - name: Build PPT slides
        run: python scripts/build_slides.py

      - name: Upload deliverables
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deliverables-py${{ matrix.python-version }}
          path: |
            docs/Rapport_Urban_Data_Explorer.pdf
            docs/Soutenance_Urban_Data_Explorer.pptx
            data/demo/urban.duckdb
          if-no-files-found: warn
          retention-days: 14

  api-smoke:
    name: API smoke (uvicorn boots, /health responds)
    runs-on: ubuntu-latest
    needs: lint-and-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12", cache: pip }

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Start API in background
        env:
          JWT_SECRET: ci-secret-thirty-two-characters-long
          GOLD_DUCKDB_PATH: ./data/demo/urban.duckdb
        run: |
          uvicorn api.main:app --host 127.0.0.1 --port 8000 &
          for i in {1..30}; do
            curl -fs http://127.0.0.1:8000/health && exit 0
            sleep 1
          done
          echo "API failed to come up" && exit 1
